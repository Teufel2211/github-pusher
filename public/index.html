<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Pusher</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [owner, setOwner] = useState('Teufel2211');
      const [repos, setRepos] = useState([]);
      const [selectedRepo, setSelectedRepo] = useState('');
      const [branches, setBranches] = useState([]);
      const [selectedBranch, setSelectedBranch] = useState('');
      const [files, setFiles] = useState([]);
      const [message, setMessage] = useState('Auto push');
      const [loading, setLoading] = useState(false);
      const [status, setStatus] = useState(null);

      const apiCall = async (action, data) => {
        try {
          const response = await fetch('/api/github', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, ...data })
          });
          const result = await response.json();
          if (!result.success) throw new Error(result.error);
          return result;
        } catch (error) {
          setStatus({ type: 'error', text: error.message });
          throw error;
        }
      };

      const fetchRepos = async () => {
        setLoading(true);
        try {
          const data = await apiCall('list_repos', { owner });
          setRepos(data.repos.map(r => r.name).sort());
          setStatus({ type: 'success', text: `${data.repos.length} Repos geladen` });
        } catch (e) {
          setStatus({ type: 'error', text: 'Repos laden fehlgeschlagen' });
        }
        setLoading(false);
      };

      const fetchBranches = async () => {
        setLoading(true);
        try {
          const data = await apiCall('list_branches', { owner, repo: selectedRepo });
          setBranches(data.branches.map(b => b.name).sort());
          setSelectedBranch(data.branches[0]?.name || '');
          setStatus({ type: 'success', text: `${data.branches.length} Branches geladen` });
        } catch (e) {
          setStatus({ type: 'error', text: 'Branches laden fehlgeschlagen' });
        }
        setLoading(false);
      };

      const push = async () => {
        if (!selectedRepo || !selectedBranch || files.length === 0) {
          setStatus({ type: 'error', text: 'Repo, Branch und Dateien erforderlich' });
          return;
        }
        setLoading(true);
        try {
          let success = 0;
          for (const file of files) {
            try {
              const content = await file.text();
              await apiCall('push_file', {
                owner,
                repo: selectedRepo,
                branch: selectedBranch,
                file_path: file.name,
                content,
                message
              });
              success++;
            } catch (e) {
              console.error(`Fehler bei ${file.name}:`, e);
            }
          }
          setStatus({ type: 'success', text: `${success}/${files.length} Dateien gepusht` });
          setFiles([]);
        } catch (e) {
          setStatus({ type: 'error', text: e.message });
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen bg-gray-900 text-white p-8">
          <div className="max-w-2xl mx-auto">
            <h1 className="text-4xl font-bold mb-2 text-blue-400">GitHub Pusher</h1>
            <p className="text-gray-400 mb-8">Auto-Upload zu GitHub</p>

            {status && (
              <div className={`mb-6 p-4 rounded ${status.type === 'success' ? 'bg-green-900 border border-green-500' : 'bg-red-900 border border-red-500'}`}>
                {status.text}
              </div>
            )}

            <div className="space-y-4">
              <div>
                <label className="text-sm font-bold mb-1 block">Owner</label>
                <input 
                  type="text" 
                  value={owner} 
                  onChange={(e) => setOwner(e.target.value)} 
                  className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded text-white"
                />
              </div>

              <div>
                <div className="flex justify-between mb-1">
                  <label className="text-sm font-bold">Repository</label>
                  <button 
                    onClick={fetchRepos} 
                    disabled={loading}
                    className="px-2 py-1 text-sm bg-blue-600 hover:bg-blue-700 rounded disabled:opacity-50"
                  >
                    {loading ? '...' : 'Laden'}
                  </button>
                </div>
                <select 
                  value={selectedRepo} 
                  onChange={(e) => { setSelectedRepo(e.target.value); setBranches([]); setSelectedBranch(''); }}
                  className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded text-white"
                >
                  <option value="">-- Repo wählen --</option>
                  {repos.map(r => <option key={r} value={r}>{r}</option>)}
                </select>
              </div>

              <div>
                <div className="flex justify-between mb-1">
                  <label className="text-sm font-bold">Branch</label>
                  <button 
                    onClick={fetchBranches} 
                    disabled={!selectedRepo || loading}
                    className="px-2 py-1 text-sm bg-blue-600 hover:bg-blue-700 rounded disabled:opacity-50"
                  >
                    {loading ? '...' : 'Laden'}
                  </button>
                </div>
                <select 
                  value={selectedBranch} 
                  onChange={(e) => setSelectedBranch(e.target.value)}
                  disabled={!branches.length}
                  className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded text-white disabled:opacity-50"
                >
                  <option value="">-- Branch wählen --</option>
                  {branches.map(b => <option key={b} value={b}>{b}</option>)}
                </select>
              </div>

              <div>
                <label className="text-sm font-bold mb-2 block">Dateien</label>
                <input 
                  type="file" 
                  multiple 
                  onChange={(e) => setFiles(Array.from(e.target.files))}
                  className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded text-white"
                />
                {files.length > 0 && <p className="text-green-400 text-sm mt-1">✓ {files.length} Datei(en)</p>}
              </div>

              <div>
                <label className="text-sm font-bold mb-1 block">Commit Message</label>
                <input 
                  type="text" 
                  value={message} 
                  onChange={(e) => setMessage(e.target.value)}
                  className="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded text-white"
                />
              </div>

              <button 
                onClick={push}
                disabled={loading || !selectedRepo || !selectedBranch || !files.length}
                className="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded font-bold disabled:opacity-50"
              >
                {loading ? 'Wird gepusht...' : 'Zu GitHub pushen'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
